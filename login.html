<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SMARTCROP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #10b981; --primary-dark: #059669; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        
        .auth-card { 
            background: white; padding: 40px; border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
            width: 100%; max-width: 400px; text-align: center; 
        }

        .logo-area i { font-size: 2.5rem; color: var(--primary); margin-bottom: 10px; }
        .project-name { font-size: 1.8rem; font-weight: 800; color: var(--text); margin: 0; letter-spacing: -1px; }
        
        h2 { margin: 10px 0 25px; color: #64748b; font-size: 1.1rem; font-weight: 500; }

        .input-group { margin-bottom: 15px; position: relative; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        
        input { 
            width: 100%; padding: 12px 15px 12px 45px; border: 2px solid #e2e8f0; 
            border-radius: 12px; box-sizing: border-box; font-size: 1rem; transition: 0.3s;
        }

        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }

        button { 
            width: 100%; padding: 14px; background: var(--primary); color: white; 
            border: none; border-radius: 12px; font-weight: 600; font-size: 1rem;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }

        button:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .toggle-link { margin-top: 25px; font-size: 0.9rem; color: #64748b; }
        .toggle-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-area">
            <i class="fas fa-leaf"></i>
            <h1 class="project-name">SMARTCROP</h1>
        </div>
        <h2>Welcome Friend!</h2>
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Username" required>
        </div>
        
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
        </div>
        
        <button onclick="saveUserAndGo()">Login Now</button>
        
        <p class="toggle-link">New user? <a href="signup.html">Create Account</a></p>
    </div>

    <script>
        function saveUserAndGo() {
            const name = document.getElementById('username').value;
            if(name) {
                // Dashboard-la avatar kaata user name-ah save panrom
                localStorage.setItem('currentUser', name);
                window.location.href = "dashboard.html"; 
            } else {
                alert("Please enter your username");
            }
        }
    </script>
</body>
</html>
