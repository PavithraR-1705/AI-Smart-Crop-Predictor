<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crop Predictor | Smart Farming</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg: #f8fafc;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            color: #0f172a;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            display: none; /* Hidden by default */
            animation: slideUp 0.4s ease-out;
        }

        .success-bg {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <i class="fas fa-seedling"></i>
        <h1>AI Crop Yield Predictor</h1>
    </div>

    <div class="input-group">
        <label>Nitrogen (N)</label>
        <div class="input-wrapper">
            <i class="fas fa-flask"></i>
            <input type="number" id="nitrogen" placeholder="Enter Nitrogen level">
        </div>
    </div>

    <div class="input-group">
        <label>Phosphorus (P)</label>
        <div class="input-wrapper">
            <i class="fas fa-vial"></i>
            <input type="number" id="phosphorus" placeholder="Enter Phosphorus level">
        </div>
    </div>

    <div class="input-group">
        <label>Potassium (K)</label>
        <div class="input-wrapper">
            <i class="fas fa-atom"></i>
            <input type="number" id="potassium" placeholder="Enter Potassium level">
        </div>
    </div>

    <div class="input-group">
        <label>Soil pH</label>
        <div class="input-wrapper">
            <i class="fas fa-tint"></i>
            <input type="number" step="0.1" id="ph" placeholder="Enter pH value (0-14)">
        </div>
    </div>

    <div class="input-group">
        <label>Rainfall (mm)</label>
        <div class="input-wrapper">
            <i class="fas fa-cloud-showers-heavy"></i>
            <input type="number" id="rainfall" placeholder="Enter annual rainfall">
        </div>
    </div>

    <button id="predictBtn" onclick="predictYield()">
        <span class="btn-text">Predict Yield</span>
        <div class="loader" id="loader"></div>
    </button>

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
